events {
    worker_connections 1024;  # Adjust based on expected traffic; this is a reasonable default
}

http {
    include /etc/nginx/mime.types;  # Handles MIME types for file extensions
    default_type application/octet-stream;  # Fallback MIME type

    # Disable access logging
    access_log off;

    # Route logging to standard error (AWS logs will capture these)
    error_log /dev/stderr;

    # Enable gzip compression for font files
    gzip on;
    gzip_types application/font-woff application/font-woff2 font/ttf font/otf;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;

    server {
        listen 80;  # Listen on port 80 (HTTP)
        listen [::]:80;  # Enable IPv6 listening

        root /usr/share/nginx/html;  # Path to font files
        index roboto-gmm.css;

        # Serve only font files
        location ~* \.(css|woff|woff2|ttf|otf)$ {
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
            add_header Access-Control-Allow-Origin "${ALLOWED_ORIGIN}";
            access_log off;  # Reduce logging for cached files
        }

        # Return file, else 404
        location / {
            try_files $uri $uri/ =404;
        }

        # Enable open file cache for performance
        open_file_cache max=1000 inactive=20s;
        open_file_cache_valid 30s;
        open_file_cache_min_uses 2;
        open_file_cache_errors on;
    }
}